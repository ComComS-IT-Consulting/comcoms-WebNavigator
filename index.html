<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>comcoms – Managed Services Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --orange:        #FF6B00;
            --orange-light:  #FF8C33;
            --orange-dark:   #CC5500;
            --dark:          #1E1E2E;
            --dark-sec:      #2A2A3E;
            --dark-hover:    #3A3A50;
            --text-light:    #FFFFFF;
            --text-muted:    #9090A8;
            --bg:            #F5F7FA;
            --card-bg:       #FFFFFF;
            --border:        #E2E6EA;
            --sidebar-w:     280px;
            --anim:          0.3s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── LOADING SCREEN ─────────────────────────────────── */
        #loading {
            position: fixed; inset: 0;
            background: var(--dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            z-index: 1000;
            transition: opacity .5s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading .brand  { font-size: 32px; font-weight: 800; color: var(--orange); letter-spacing: 1px; }
        #loading .sub    { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,.1);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── SIDEBAR ────────────────────────────────────────── */
        #sidebar {
            width: var(--sidebar-w);
            background: var(--dark);
            color: var(--text-light);
            display: flex; flex-direction: column;
            height: 100vh;
            position: fixed; left: 0; top: 0;
            z-index: 100;
            transition: transform var(--anim);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--orange) transparent;
        }
        #sidebar::-webkit-scrollbar       { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }

        .sidebar-logo {
            padding: 22px 20px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; user-select: none;
        }
        .sidebar-logo img   { height: 38px; width: auto; object-fit: contain; }
        .logo-fallback      { display: none; flex-direction: column; }
        .logo-name          { font-size: 22px; font-weight: 800; color: var(--orange); }
        .logo-tagline       { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; }

        .sidebar-nav { flex: 1; padding: 12px 0; }

        .nav-category { margin-bottom: 2px; }

        .cat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px;
            user-select: none;
            transition: color var(--anim);
        }
        .cat-header:hover          { color: var(--text-light); }
        .cat-header .cat-left      { display: flex; align-items: center; gap: 8px; }
        .cat-header .chevron       { transition: transform var(--anim); font-size: 10px; }
        .cat-header.collapsed .chevron { transform: rotate(-90deg); }

        .cat-items {
            overflow: hidden;
            transition: max-height .35s ease;
            max-height: 600px;
        }
        .cat-items.collapsed { max-height: 0; }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 9px 20px 9px 30px;
            color: rgba(255,255,255,.72);
            font-size: 13.5px;
            border-left: 3px solid transparent;
            text-decoration: none;
            transition: all var(--anim);
        }
        .nav-item:hover         { background: var(--dark-hover); color: #fff; border-left-color: var(--orange); }
        .nav-item .i-icon       { width: 18px; text-align: center; color: var(--orange); font-size: 13px; flex-shrink: 0; }
        .nav-item .i-label      { flex: 1; }
        .nav-item .i-ext        { font-size: 10px; opacity: 0; transition: opacity var(--anim); color: var(--orange-light); }
        .nav-item:hover .i-ext  { opacity: 1; }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid rgba(255,255,255,.07);
            font-size: 11px; color: var(--text-muted);
        }

        /* ── MAIN ───────────────────────────────────────────── */
        #main {
            margin-left: var(--sidebar-w);
            flex: 1; height: 100vh;
            overflow-y: auto;
            display: flex; flex-direction: column;
            transition: margin-left var(--anim);
        }

        /* ── TOPBAR ─────────────────────────────────────────── */
        #topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
            flex-shrink: 0;
        }
        .tb-left  { display: flex; align-items: center; gap: 14px; }
        .tb-title { font-size: 15px; font-weight: 600; color: #333; }

        #hamburger {
            display: none; background: none; border: none;
            cursor: pointer; padding: 8px; border-radius: 6px;
            color: #666; font-size: 18px;
            transition: background var(--anim);
        }
        #hamburger:hover { background: var(--bg); }

        .status-pill {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text-muted);
            background: var(--bg); padding: 4px 12px; border-radius: 20px;
        }
        .dot       { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
        .dot.ok    { background: #22c55e; }
        .dot.error { background: #ef4444; }
        .dot.busy  { background: var(--orange); animation: blink 1s ease infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── LANDING ────────────────────────────────────────── */
        #landing { flex: 1; padding: 36px 40px; display: none; }
        #landing.active { display: block; }

        .hero {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-sec) 100%);
            border-radius: 16px; padding: 48px 44px;
            color: #fff; margin-bottom: 36px;
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; top: -60%; right: -5%;
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(255,107,0,.18) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute; bottom: -40%; left: 20%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,107,0,.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,107,0,.2); border: 1px solid rgba(255,107,0,.35);
            color: var(--orange-light); padding: 4px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.2px; margin-bottom: 18px;
        }
        .hero h1    { font-size: 38px; font-weight: 800; line-height: 1.2; margin-bottom: 14px; }
        .hero h1 em { font-style: normal; color: var(--orange); }
        .hero p     { font-size: 15px; color: rgba(255,255,255,.58); max-width: 480px; }

        .section-head {
            font-size: 17px; font-weight: 700; color: #333;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-head::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 14px; margin-bottom: 40px;
        }

        .svc-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 20px;
            display: flex; align-items: center; gap: 14px;
            text-decoration: none; color: inherit;
            transition: all var(--anim);
        }
        .svc-card:hover {
            border-color: var(--orange);
            box-shadow: 0 6px 20px rgba(255,107,0,.14);
            transform: translateY(-2px);
        }
        .card-ico {
            width: 44px; height: 44px; flex-shrink: 0;
            background: rgba(255,107,0,.1); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--orange);
        }
        .card-body       { flex: 1; min-width: 0; }
        .card-title      { font-size: 13.5px; font-weight: 600; }
        .card-desc       { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-arr        { color: #ccc; font-size: 12px; }

        /* ── MOBILE OVERLAY ─────────────────────────────────── */
        #overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.5); z-index: 99;
        }
        #overlay.active { display: block; }

        /* ── RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 768px) {
            #sidebar                 { transform: translateX(-100%); }
            #sidebar.open            { transform: translateX(0); }
            #main                    { margin-left: 0; }
            #hamburger               { display: flex; }
            #landing                 { padding: 20px; }
            .hero                    { padding: 28px 22px; }
            .hero h1                 { font-size: 26px; }
            .cards-grid              { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .cards-grid              { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ── LOADING SCREEN ──────────────────────────────────────── -->
<div id="loading">
    <div class="brand">comcoms</div>
    <div class="sub">Complete Computer Systems</div>
    <div class="spinner"></div>
</div>

<!-- ── MOBILE OVERLAY ─────────────────────────────────────── -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside id="sidebar">
    <div class="sidebar-logo" onclick="showLanding()">
        <img src="https://raw.githubusercontent.com/ComComs-IT-Consulting/comcoms-WebNavigator/main/Logo.png"
             alt="comcoms"
             onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';">
        <div class="logo-fallback">
            <span class="logo-name">comcoms</span>
            <span class="logo-tagline">Complete Computer Systems</span>
        </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
        <div id="footerYear"></div>
        <div id="configSource" style="font-size:10px; opacity:.6; margin-top:2px;"></div>
    </div>
</aside>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<div id="main">

    <!-- Topbar -->
    <header id="topbar">
        <div class="tb-left">
            <button id="hamburger" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <span class="tb-title" id="tbTitle">Managed Services Portal</span>
        </div>
        <div class="status-pill">
            <span class="dot busy" id="statusDot"></span>
            <span id="statusTxt">Lade Konfiguration…</span>
        </div>
    </header>

    <!-- Landing Page -->
    <section id="landing" class="active">
        <div class="hero">
            <div class="hero-badge"><i class="fas fa-shield-halved"></i>&nbsp;Managed Services</div>
            <h1>Willkommen im<br><em>comcoms Portal</em></h1>
            <p>Zentraler Zugriff auf alle Managed Service Plattformen –<br>sicher, schnell und übersichtlich.</p>
        </div>

        <div class="section-head">
            <i class="fas fa-star" style="color:var(--orange)"></i> Favoriten
        </div>
        <div class="cards-grid" id="quickCards"></div>
    </section>

</div><!-- #main -->

<script>
// ══════════════════════════════════════════════════════════════
//  KONFIGURATION
//  Setze CONFIG_URL auf den öffentlichen Google-Drive-Link
//  deiner config.json (Beispiel unten).
//
//  Google Drive: Datei öffentlich teilen → "Jeder mit dem Link" →
//  Link-ID kopieren → URL aufbauen:
//  'https://drive.google.com/uc?export=download&id=DEINE_ID'
//
//  Leer lassen ('') = Demo-Daten aus DEMO_CONFIG werden verwendet.
// ══════════════════════════════════════════════════════════════
const CONFIG_URL = 'https://raw.githubusercontent.com/ComComs-IT-Consulting/comcoms-WebNavigator/main/config.json';

// ── DEMO-DATEN ─────────────────────────────────────────────────
const DEMO_CONFIG = {
  "company": {
    "name": "comcoms",
    "tagline": "Complete Computer Systems",
    "year": "2024"
  },
  "menu": [
    {
      "category": "RMM & Monitoring",
      "icon": "fa-desktop",
      "items": [
        { "text": "Ninja RMM",            "url": "https://comcoms.rmmservice.eu/", "icon": "fa-laptop",    "description": "Remote Monitoring & Management" },
        { "text": "Monitoring Dashboard", "url": "https://example.com/monitoring", "icon": "fa-chart-line","description": "System Monitoring Übersicht"   }
      ]
    },
    {
      "category": "Security",
      "icon": "fa-shield-halved",
      "items": [
        { "text": "Antivirus Portal",    "url": "https://example.com/av",       "icon": "fa-virus-slash", "description": "Endpoint Protection"   },
        { "text": "Firewall Management", "url": "https://example.com/firewall", "icon": "fa-fire",        "description": "Netzwerk-Sicherheit"   }
      ]
    },
    {
      "category": "Backup & Recovery",
      "icon": "fa-database",
      "items": [
        { "text": "Backup Manager", "url": "https://example.com/backup", "icon": "fa-cloud-arrow-up", "description": "Datensicherung & Wiederherstellung" }
      ]
    },
    {
      "category": "Cloud Services",
      "icon": "fa-cloud",
      "items": [
        { "text": "Microsoft 365 Admin", "url": "https://admin.microsoft.com", "icon": "fa-microsoft", "description": "M365 Administration"      },
        { "text": "Azure Portal",        "url": "https://portal.azure.com",   "icon": "fa-cloud",     "description": "Azure Cloud Management"   }
      ]
    }
  ]
};

// ── CONFIG LADEN ────────────────────────────────────────────────
async function loadConfig() {
    if (!CONFIG_URL) return { data: DEMO_CONFIG, source: 'demo', error: null };
    try {
        const r = await fetch(CONFIG_URL);
        if (!r.ok) throw new Error('HTTP-Fehler ' + r.status);
        const data = await r.json();
        return { data, source: 'github', error: null };
    } catch (e) {
        console.warn('Config konnte nicht geladen werden:', e.message);
        return { data: DEMO_CONFIG, source: 'demo', error: e.message };
    }
}

// ── MENÜ AUFBAUEN ───────────────────────────────────────────────
function buildMenu(cfg) {
    const nav   = document.getElementById('sidebarNav');
    const cards = document.getElementById('quickCards');
    nav.innerHTML = '';
    cards.innerHTML = '';

    cfg.menu.forEach(cat => {
        // Sidebar-Kategorie
        const catEl = document.createElement('div');
        catEl.className = 'nav-category';

        const hdr = document.createElement('div');
        hdr.className = 'cat-header';
        hdr.innerHTML = `
            <span class="cat-left">
                <i class="fas ${cat.icon || 'fa-folder'}"></i>
                ${cat.category}
            </span>
            <i class="fas fa-chevron-down chevron"></i>`;
        hdr.addEventListener('click', () => {
            hdr.classList.toggle('collapsed');
            hdr.nextElementSibling.classList.toggle('collapsed');
        });

        const itemsEl = document.createElement('div');
        itemsEl.className = 'cat-items';

        cat.items.forEach(item => {
            // Sidebar-Link
            const a = document.createElement('a');
            a.className = 'nav-item';
            a.href      = item.url;
            a.target    = '_blank';
            a.rel       = 'noopener noreferrer';
            a.innerHTML = `
                <span class="i-icon"><i class="fas ${item.icon || 'fa-link'}"></i></span>
                <span class="i-label">${item.text}</span>
                ${item.favorite ? '<i class="fas fa-star" style="font-size:9px;color:var(--orange);margin-right:4px;opacity:.8;"></i>' : ''}
                <i class="fas fa-arrow-up-right-from-square i-ext"></i>`;
            itemsEl.appendChild(a);

            // Favoriten-Card – nur wenn favorite === true gesetzt
            if (item.favorite === true) {
                const card = document.createElement('a');
                card.className = 'svc-card';
                card.href      = item.url;
                card.target    = '_blank';
                card.rel       = 'noopener noreferrer';
                card.innerHTML = `
                    <div class="card-ico"><i class="fas ${item.icon || 'fa-link'}"></i></div>
                    <div class="card-body">
                        <div class="card-title">${item.text}</div>
                        <div class="card-desc">${item.description || cat.category}</div>
                    </div>
                    <i class="fas fa-chevron-right card-arr"></i>`;
                cards.appendChild(card);
            }
        });

        catEl.appendChild(hdr);
        catEl.appendChild(itemsEl);
        nav.appendChild(catEl);
    });
}

// ── STATUS ──────────────────────────────────────────────────────
function setStatus(state, text) {
    document.getElementById('statusDot').className = 'dot ' + state;
    document.getElementById('statusTxt').textContent = text;
}

// ── SIDEBAR ─────────────────────────────────────────────────────
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}
function showLanding() {
    document.getElementById('landing').classList.add('active');
    document.getElementById('tbTitle').textContent = 'Managed Services Portal';
    closeSidebar();
}

// ── INIT ─────────────────────────────────────────────────────────
(async () => {
    const { data, source, error } = await loadConfig();
    buildMenu(data);

    // Footer
    document.getElementById('footerYear').textContent =
        '© ' + (data.company?.year || new Date().getFullYear()) + ' ' + (data.company?.name || 'comcoms');
    document.getElementById('configSource').textContent =
        source === 'github' ? 'Quelle: GitHub' : 'Quelle: Demo-Daten';

    // Status – Fehler darf NICHT überschrieben werden
    if (error) {
        setStatus('error', 'Fehler: ' + error + ' → Demo-Daten');
    } else if (source === 'demo') {
        setStatus('busy', 'Demo-Konfiguration (kein CONFIG_URL gesetzt)');
    } else {
        setStatus('ok', 'Konfiguration geladen (GitHub)');
    }

    // Loading-Screen ausblenden
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 700);
})();
</script>
</body>
</html>
